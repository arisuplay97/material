        materialName:
          type: ["string", "null"]
        materialCode:
          type: ["string", "null"]
        materialUnit:
          type: ["string", "null"]
        branchName:
          type: ["string", "null"]
        branchId:
          type: ["string", "null"]
        qtyIssued:
          type: integer
        issuedById:
          type: ["string", "null"]
        issuedByName:
          type: ["string", "null"]
        issuedAt:
          type: string
          format: date-time
        slaDeadline:
          type: string
          format: date-time
        status:
          type: string
          enum: [dikirim, diterima_cabang, menunggu_verifikasi, terverifikasi, kritis]
        qrCodeUrl:
          type: ["string", "null"]
        riskScore:
          type: ["number", "null"]
        hoursRemaining:
          type: ["number", "null"]
        isOverdue:
