openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PDAM Tiara Material Tracking & Verification System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: branches
    description: Branch management
  - name: materials
    description: Material master data
  - name: workOrders
    description: Work orders
  - name: materialRequests
    description: Material requests
  - name: trackings
    description: Material tracking
  - name: dashboard
    description: Dashboard & analytics
  - name: reports
    description: Reports & exports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete/deactivate a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Branches
  /branches:
    get:
      operationId: listBranches
      tags: [branches]
      summary: List all branches
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
    post:
      operationId: createBranch
      tags: [branches]
      summary: Create a branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchInput"
      responses:
        "201":
          description: Branch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"

  /branches/{id}:
    get:
      operationId: getBranch
      tags: [branches]
      summary: Get branch by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Branch details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
    put:
      operationId: updateBranch
      tags: [branches]
      summary: Update a branch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchInput"
      responses:
        "200":
          description: Updated branch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"

  # Materials
  /materials:
    get:
      operationId: listMaterials
      tags: [materials]
      summary: List all materials
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
    post:
      operationId: createMaterial
      tags: [materials]
      summary: Create a material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialInput"
      responses:
        "201":
          description: Material created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /materials/{id}:
    get:
      operationId: getMaterial
      tags: [materials]
      summary: Get material by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Material details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
    put:
      operationId: updateMaterial
      tags: [materials]
      summary: Update a material
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialInput"
      responses:
        "200":
          description: Updated material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  # Work Orders
  /work-orders:
    get:
      operationId: listWorkOrders
      tags: [workOrders]
      summary: List work orders
      parameters:
        - name: branchId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      operationId: createWorkOrder
      tags: [workOrders]
      summary: Create a work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderInput"
      responses:
        "201":
          description: Work order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /work-orders/{id}:
    get:
      operationId: getWorkOrder
      tags: [workOrders]
      summary: Get work order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Work order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  # Material Requests
  /material-requests:
    get:
      operationId: listMaterialRequests
      tags: [materialRequests]
      summary: List material requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: string
        - name: requestedBy
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of material requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaterialRequest"
    post:
      operationId: createMaterialRequest
      tags: [materialRequests]
      summary: Create a material request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialRequestInput"
      responses:
        "201":
          description: Material request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialRequest"

  /material-requests/{id}:
    get:
      operationId: getMaterialRequest
      tags: [materialRequests]
      summary: Get material request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Material request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialRequest"

  /material-requests/{id}/approve:
    post:
      operationId: approveMaterialRequest
      tags: [materialRequests]
      summary: Approve a material request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialRequest"

  /material-requests/{id}/reject:
    post:
      operationId: rejectMaterialRequest
      tags: [materialRequests]
      summary: Reject a material request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "200":
          description: Request rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialRequest"

  # Trackings
  /trackings:
    get:
      operationId: listTrackings
      tags: [trackings]
      summary: List trackings
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: string
        - name: isOverdue
          in: query
          schema:
            type: boolean
        - name: assignedTo
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of trackings with pagination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingListResponse"
    post:
      operationId: createTracking
      tags: [trackings]
      summary: Issue material from warehouse and create tracking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackingInput"
      responses:
        "201":
          description: Tracking created with QR code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tracking"

  /trackings/{id}:
    get:
      operationId: getTracking
      tags: [trackings]
      summary: Get tracking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tracking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingDetail"

  /trackings/by-code/{code}:
    get:
      operationId: getTrackingByCode
      tags: [trackings]
      summary: Get tracking by tracking code (for QR scan)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tracking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingDetail"

  /trackings/{id}/receive:
    post:
      operationId: receiveTracking
      tags: [trackings]
      summary: Confirm branch reception by scanning QR
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveInput"
      responses:
        "200":
          description: Reception confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tracking"

  /trackings/{id}/proof:
    post:
      operationId: submitInstallationProof
      tags: [trackings]
      summary: Submit installation proof (photo + GPS)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallationProofInput"
      responses:
        "201":
          description: Proof submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallationProof"
    get:
      operationId: getInstallationProof
      tags: [trackings]
      summary: Get installation proof for a tracking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Installation proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallationProof"

  /trackings/{id}/events:
    get:
      operationId: getTrackingEvents
      tags: [trackings]
      summary: Get event timeline for a tracking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tracking events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackingEvent"

  /trackings/{id}/flag:
    post:
      operationId: flagTracking
      tags: [trackings]
      summary: Flag tracking for audit review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlagInput"
      responses:
        "200":
          description: Tracking flagged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /trackings/{id}/qr:
    get:
      operationId: getQrCode
      tags: [trackings]
      summary: Get QR code image for a tracking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: QR code data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrCodeResponse"

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Overall tracking summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/branch-status:
    get:
      operationId: getBranchStatus
      tags: [dashboard]
      summary: Status breakdown per branch
      responses:
        "200":
          description: Per-branch status list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BranchStatus"

  /dashboard/risk-scores:
    get:
      operationId: getRiskScores
      tags: [dashboard]
      summary: Risk scores per branch for audit prioritization
      responses:
        "200":
          description: Branch risk scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BranchRiskScore"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent tracking activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/sla-overview:
    get:
      operationId: getSlaOverview
      tags: [dashboard]
      summary: SLA countdown and overdue summary
      responses:
        "200":
          description: SLA overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlaOverview"

  /dashboard/flagged-proofs:
    get:
      operationId: getFlaggedProofs
      tags: [dashboard]
      summary: Proofs flagged for anti-fake-GPS review
      parameters:
        - name: reviewStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Flagged proofs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlaggedProof"

  /dashboard/installation-map:
    get:
      operationId: getInstallationMap
      tags: [dashboard]
      summary: GPS coordinates of all installations for map view
      responses:
        "200":
          description: Map data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapPoint"

  # Proofs review
  /proofs/{id}/review:
    post:
      operationId: reviewProof
      tags: [dashboard]
      summary: SPI reviews a flagged proof (approve/reject)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofReviewInput"
      responses:
        "200":
          description: Proof reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallationProof"

  # Reports
  /reports/material-accountability:
    get:
      operationId: getMaterialAccountabilityReport
      tags: [reports]
      summary: Material accountability report for a period
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: branchId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Accountability report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountabilityReport"

  /reports/audit-trail:
    get:
      operationId: getAuditTrail
      tags: [reports]
      summary: Audit log for a tracking or date range
      parameters:
        - name: trackingId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: actorId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Audit trail entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  # Upload
  /upload/photo:
    post:
      operationId: uploadPhoto
      tags: [trackings]
      summary: Upload installation photo (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUploadInput"
      responses:
        "200":
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoUploadResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    # Auth
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # User
    User:
      type: object
      required: [id, name, email, role, isActive, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin_gudang, petugas_lapangan, spi, direksi, superadmin]
        branchId:
          type: ["string", "null"]
        branchName:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin_gudang, petugas_lapangan, spi, direksi, superadmin]
        branchId:
          type: ["string", "null"]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin_gudang, petugas_lapangan, spi, direksi, superadmin]
        branchId:
          type: ["string", "null"]
        isActive:
          type: boolean

    # Branch
    Branch:
      type: object
      required: [id, name, code, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        createdAt:
          type: string
          format: date-time
        activeTrackings:
          type: ["integer", "null"]
        criticalCount:
          type: ["integer", "null"]

    BranchInput:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string

    # Material
    Material:
      type: object
      required: [id, code, name, category, unit, currentStock, createdAt]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [valve, pipe, fitting, meter, other]
        unit:
          type: string
        unitPrice:
          type: ["number", "null"]
        currentStock:
          type: integer
        branchId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    MaterialInput:
      type: object
      required: [code, name, category, unit]
      properties:
        code:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [valve, pipe, fitting, meter, other]
